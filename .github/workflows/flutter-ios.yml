name: Flutter iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'

    - name: Vérifier le contenu de plutovets_mobile
      run: ls -la plutovets_mobile/

    - name: Install dependencies
      run: |
        cd plutovets_mobile
        flutter pub get

    - name: Analyze code
      run: |
        cd plutovets_mobile
        flutter analyze

    - name: Run tests
      run: |
        cd plutovets_mobile
        flutter test

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build iOS Simulator
      run: |
        cd plutovets_mobile
        flutter build ios --simulator

    - name: Build iOS (for testing, no codesign)
      run: |
        cd plutovets_mobile
        flutter build ios --no-codesign

    - name: Upload iOS Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: plutovets_mobile/build/ios/iphoneos/Runner.app