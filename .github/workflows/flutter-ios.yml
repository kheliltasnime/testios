name: Flutter iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-ios:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'

    # Vérification facultative : voir où on est et si pubspec.yaml existe
    - name: List files (debug)
      run: ls -la plutovets_mobile/

    - name: Install dependencies
      run: flutter pub get
      working-directory: plutovets_mobile

    - name: Analyze code
      run: flutter analyze
      working-directory: plutovets_mobile

    - name: Run tests
      run: flutter test
      working-directory: plutovets_mobile

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Build iOS Simulator
      run: flutter build ios --simulator
      working-directory: plutovets_mobile

    - name: Build iOS (for testing, no codesign)
      run: flutter build ios --no-codesign
      working-directory: plutovets_mobile

    - name: Upload iOS Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: plutovets_mobile/build/ios/iphoneos/Runner.app