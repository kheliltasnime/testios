name: Flutter iOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test-ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: plutovets_mobile   # ← tout se passe dans ce dossier

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.2'
        
    - name: Install dependencies
      run: flutter pub get          # plus besoin de cd
      
    - name: Analyze code
      run: flutter analyze
      
    - name: Run tests
      run: flutter test
      
    - name: Build iOS (for testing)
      run: flutter build ios --no-codesign   # plus besoin de cd
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
        
    - name: Build iOS Simulator
      run: flutter build ios --simulator
        
    - name: Upload iOS Build
      uses: actions/upload-artifact@v4
      with:
        name: ios-build
        path: plutovets_mobile/build/ios/iphoneos/Runner.app   # chemin absolu depuis la racine